<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Platform Kiezen — Analyse Dashboard</title>
  <link rel="stylesheet" href="css/platform.css">
</head>
<body>

  <div class="wrapper">

    <div class="header">
      <div class="header-label">Content Analyse Tool</div>
      <div class="header-title">Kies je platform</div>
      <div class="header-sub">Selecteer een platform om de analyse te bekijken</div>
    </div>

    <div class="platforms">

      <!-- YouTube -->
      <a class="platform-card youtube" href="dashboards/dashboard_tube.html">
        <div class="corner"></div>
        <div class="platform-icon">
          <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M22.54 6.42a2.78 2.78 0 0 0-1.95-1.96C18.88 4 12 4 12 4s-6.88 0-8.59.46A2.78 2.78 0 0 0 1.46 6.42 29 29 0 0 0 1 12a29 29 0 0 0 .46 5.58 2.78 2.78 0 0 0 1.95 1.96C5.12 20 12 20 12 20s6.88 0 8.59-.46a2.78 2.78 0 0 0 1.95-1.96A29 29 0 0 0 23 12a29 29 0 0 0-.46-5.58z" fill="#ff4d00"/>
            <polygon points="9.75,15.02 15.5,12 9.75,8.98 9.75,15.02" fill="#0a0a0f"/>
          </svg>
        </div>
        <div class="platform-name">YouTube</div>
        <div class="platform-desc">Shorts &amp; Long-form analyse</div>
        <div class="platform-arrow">Open dashboard →</div>
      </a>

      <!-- TikTok -->
      <a class="platform-card tiktok" href="dashboards/dashboard_tik.html">
        <div class="corner"></div>
        <div class="platform-icon">
          <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M19.59 6.69a4.83 4.83 0 0 1-3.77-4.25V2h-3.45v13.67a2.89 2.89 0 0 1-2.88 2.5 2.89 2.89 0 0 1-2.89-2.89 2.89 2.89 0 0 1 2.89-2.89c.28 0 .54.04.79.1V9.01a6.33 6.33 0 0 0-.79-.05 6.34 6.34 0 0 0-6.34 6.34 6.34 6.34 0 0 0 6.34 6.34 6.34 6.34 0 0 0 6.33-6.34V8.75a8.17 8.17 0 0 0 4.78 1.52V6.82a4.85 4.85 0 0 1-1.01-.13z" fill="#ff2d55"/>
            <path d="M19.59 6.69a4.83 4.83 0 0 1-3.77-4.25V2h-3.45v13.67a2.89 2.89 0 0 1-2.88 2.5 2.89 2.89 0 0 1-2.89-2.89 2.89 2.89 0 0 1 2.89-2.89c.28 0 .54.04.79.1V9.01a6.33 6.33 0 0 0-.79-.05 6.34 6.34 0 0 0-6.34 6.34 6.34 6.34 0 0 0 6.34 6.34 6.34 6.34 0 0 0 6.33-6.34V8.75a8.17 8.17 0 0 0 4.78 1.52V6.82a4.85 4.85 0 0 1-1.01-.13z" fill="url(#tt-grad)" opacity="0.5"/>
            <defs>
              <linearGradient id="tt-grad" x1="0" y1="0" x2="1" y2="1">
                <stop offset="0%" stop-color="#00f2ea"/>
                <stop offset="100%" stop-color="#ff2d55"/>
              </linearGradient>
            </defs>
          </svg>
        </div>
        <div class="platform-name">TikTok</div>
        <div class="platform-desc">Video &amp; trend analyse</div>
        <div class="platform-arrow">Open dashboard →</div>
      </a>

    </div>

    <div class="footer">Analyse Dashboard &nbsp;·&nbsp; © Aertssen Media</div>

  </div>

  <script src="js/platform.js"></script>
</body>
</html>
